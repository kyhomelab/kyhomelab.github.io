<section class="hero is-fullheight has-text-centered" id="latest-posts">
    <div class="hero-body">
        <div class="container">
            <h1 class="title is-1 has-text-weight-bold">Latest Blog Posts</h1>
            <br>
            <h2 class="subtitle">Recent writeups and walkthroughs</h2>
            <br>
            <div class="columns is-multiline is-centered">
                {% for post in site.posts limit:3 %}
                <div class="column is-one-third-desktop is-half-tablet is-full-mobile">
                    <a href="{{ post.url | absolute_url }}" class="latest-post-link">
                        <div class="box latest-post-card">
                            {% if post.post-image %}
                            <div class="latest-post-image" style="background-image: url({{ post.post-image }});"></div>
                            {% endif %}
                            <div class="latest-post-content">
                                <h3 class="latest-post-title">{{ post.title }}</h3>
                                <span class="latest-post-date"><i class="fas fa-calendar-alt"></i> {{ post.date | date: "%B %d, %Y" }}</span>
                                <p class="latest-post-excerpt">{{ post.excerpt | strip_html | truncate: 120 }}</p>
                            </div>
                        </div>
                    </a>
                </div>
                {% endfor %}
            </div>
            <br>
            <a href="/blog" class="button is-medium cosmic-button">View All Posts</a>
        </div>
    </div>
</section>
