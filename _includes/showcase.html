<section class="hero is-fullheight has-text-centered" id="hero">
  <div class="hero-body">
    <div class="container">
      <h1 class="title has-text-white is-size-1 is-uppercase has-text-weight-bold">
        {{site.title}}
      </h1>
      <h3 class="subtitle has-text-white-bis is-uppercase has-text-weight-medium is-marginless">
        {{site.description}}
      </h3>
      <hr>
      <a href="{{site.url}}{{site.baseurl}}/#about"
        class="button is-white is-rounded is-outlined is-uppercase has-text-weight-normal">Read More</a>
      &nbsp;
      <a href="https://grafana.kyhomelab.com" target="_blank" rel="noopener"
        class="button is-rounded is-uppercase has-text-weight-normal cta-gradient cta-gradient--cyan">▸ Live HomeLab ◂</a>
      &nbsp;
      <a href="{{site.url}}{{site.baseurl}}/honeypot-attacks/"
        class="button is-rounded is-uppercase has-text-weight-normal cta-gradient cta-gradient--magenta">▸ Attack Map ◂</a>
      &nbsp;
      <a href="{{site.url}}{{site.baseurl}}/assets/kyle-resume.pdf" target="_blank"
        class="button is-white is-rounded is-outlined is-uppercase has-text-weight-normal">Download Resume</a>
      <style>
        @keyframes liveflow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .cta-gradient {
          background-size: 200% auto !important;
          color: #0a0a1f !important;
          border: none !important;
          font-weight: 700 !important;
          animation: liveflow 6s linear infinite;
          transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }
        .cta-gradient--cyan {
          background: linear-gradient(90deg, #00F5FF 0%, #FF00AA 50%, #FFFF00 100%) !important;
          background-size: 200% auto !important;
          box-shadow: 0 0 20px rgba(0, 245, 255, 0.45);
        }
        .cta-gradient--magenta {
          background: linear-gradient(90deg, #FF00AA 0%, #FFFF00 50%, #00F5FF 100%) !important;
          background-size: 200% auto !important;
          box-shadow: 0 0 20px rgba(255, 0, 170, 0.45);
        }
        .cta-gradient:hover, .cta-gradient:focus {
          transform: translateY(-3px) scale(1.03);
          filter: brightness(1.1);
          color: #0a0a1f !important;
        }
        .cta-gradient--cyan:hover, .cta-gradient--cyan:focus {
          box-shadow: 0 0 28px rgba(0, 245, 255, 0.85), 0 0 48px rgba(255, 0, 170, 0.4);
        }
        .cta-gradient--magenta:hover, .cta-gradient--magenta:focus {
          box-shadow: 0 0 28px rgba(255, 0, 170, 0.85), 0 0 48px rgba(0, 245, 255, 0.4);
        }
        .cta-gradient:active { transform: translateY(-1px) scale(1.01); }
      </style>
    </div>
